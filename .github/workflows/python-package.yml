name: Traffic Monitor CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ─────────────────────────────
    # Checkout repo
    # ─────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v4

    # ─────────────────────────────
    # Setup Python
    # ─────────────────────────────
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ─────────────────────────────
    # Install dependencies
    # ─────────────────────────────
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ─────────────────────────────
    # Lint (optional but recommended)
    # ─────────────────────────────
    - name: Lint code
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # ─────────────────────────────
    # Run basic check (app import test)
    # ─────────────────────────────
    - name: Test app startup
      run: |
        python -c "import app; print('App imported successfully')"

    # ─────────────────────────────
    # Optional: Run app for a few seconds
    # ─────────────────────────────
    - name: Run server smoke test
      run: |
        timeout 10s python app.py || true

    # ─────────────────────────────
    # Done
    # ─────────────────────────────
    - name: CI Success
      run: echo "✅ Build & checks passed"